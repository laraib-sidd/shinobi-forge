name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system deps for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Run Rust tests
        run: cd src-tauri && cargo test

  build-windows:
    runs-on: windows-latest
    needs: test-rust
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install frontend deps
        run: npm install
      - name: Build app
        run: npm run tauri build -- --bundles nsis
      - name: Upload portable exe to release
        uses: softprops/action-gh-release@v1
        with:
          name: "Shinobi Forge ${{ github.ref_name }}"
          body: |
            ## Shinobi Forge ${{ github.ref_name }}

            **Portable — no installation needed.**

            1. Download `shinobi-forge.exe`
            2. Put it anywhere (Desktop, Documents, wherever)
            3. Double-click to run
            4. A `data/` folder is created next to the exe for settings and save backups

            **Requirements:** Windows 10/11 with WebView2 (pre-installed on modern Windows via Edge)

            > SmartScreen warning? Click "More info" → "Run anyway" (app is unsigned)
          draft: false
          files: src-tauri/target/release/shinobi-forge.exe

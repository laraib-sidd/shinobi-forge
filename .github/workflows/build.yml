name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system deps for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Run Rust tests
        run: cd src-tauri && cargo test

  build-windows:
    runs-on: windows-latest
    needs: test-rust
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install frontend deps
        run: npm install
      - name: Build frontend
        run: npm run build
      - name: Build portable exe
        run: cargo tauri build --bundles none
        working-directory: .
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "Shinobi Forge ${{ github.ref_name }}"
          body: |
            ## Shinobi Forge ${{ github.ref_name }}

            **Portable app — no installation needed.**

            1. Download `shinobi-forge.exe`
            2. Put it anywhere (Desktop, a folder, wherever)
            3. Double-click to run
            4. A `data/` folder will be created next to the exe for settings and save backups

            > Windows may show a SmartScreen warning — click "More info" → "Run anyway"
          draft: false
          files: src-tauri/target/release/shinobi-forge.exe
